<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DiptARM Format</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Global Scale Down */
    html { font-size: 13px; }

    :root {
      /* Real Madrid Royal Blue Palette */
      --primary: #00529F;        
      --primary-dark: #003C74;
      --secondary: #5B2E90;      
      --bg-green-start: #ffffff; 
      --bg-green-end: #dbeafe;
      --gold: #FDB913;           
      --white: #ffffff;
      
      /* Glassmorphism & Stamp Vars */
      --glass-bg: rgba(255, 255, 255, 0.95);
      --glass-border: rgba(0, 82, 159, 0.22);
      --glass-shadow: rgba(0, 40, 90, 0.22);
      
      --text-dark: #0a1b2e;
      --text-muted: #33506b;
      
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      /* Background: kartun 2D, cerah, dengan pola Real Madrid */
      background: linear-gradient(135deg, #ffffff 0%, #eef6ff 40%, #dbeafe 100%);
      min-height: 100vh;
      padding: 24px 20px;
      color: var(--text-dark);
      position: relative; 
      overflow-x: hidden;
    }

    /* Pattern Background (Bola & Bintang) */
    @keyframes snowMove { 
      0%   { transform: translateY(-10px); background-position: 0 0, 0 0, 0 0, 0 0; }
      100% { transform: translateY(120px); background-position: 0 520px, 0 820px, 0 360px, 0 400px; } 
    }
    body::after {
      content: "";
      position: fixed; left: 0; right: 0; top: 0; bottom: 0; pointer-events: none; z-index: 0;
      opacity: 0.55;
      background-image:
        radial-gradient(circle at 16px 16px, rgba(255,255,255,.95) 0 7px, rgba(0,82,159,.25) 7px 8px, transparent 8px 44px),
        radial-gradient(circle at 46px 40px, rgba(253,185,19,.55) 0 2px, transparent 3px),
        radial-gradient(circle at 20px 52px, rgba(0,82,159,.22) 0 2px, transparent 3px),
        radial-gradient(circle at 80px 18px, rgba(253,185,19,.35) 0 3px, transparent 4px);
      background-size: 96px 96px, 140px 140px, 160px 160px, 220px 220px;
      animation: snowMove 16s linear infinite;
    }

    .wrap { max-width: 800px; margin: 0 auto; position: relative; z-index: 2; }
    
    /* Header Stamp Banner */
    header { 
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px; 
      padding: 12px 18px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.85);
      border: 3px solid rgba(0,82,159,.18);
      box-shadow: 0 10px 0 rgba(0,82,159,.14);
    }
    header h1 { 
      margin: 0; 
      color: var(--primary); 
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem; 
      font-weight: 800; 
      display: flex; align-items: center; gap: 8px;
      text-shadow: 0 2px 0 rgba(253,185,19,.35), 0 10px 24px rgba(0,82,159,.12);
    }
    h1 .flag { display: inline-block; filter: grayscale(1) opacity(.35); }

    /* Tombol Kembali: Gaya "Sticker" 2D */
    header .brand-badge {
      background: linear-gradient(180deg, rgba(0,82,159,.18), rgba(0,82,159,.08));
      color: var(--primary);
      padding: 8px 16px;
      border-radius: 99px;
      font-weight: 700;
      font-size: .8rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      border: 2px solid rgba(0,82,159,.25);
      transition: all .2s ease;
      font-family: 'Outfit', sans-serif;
      box-shadow: 0 6px 0 rgba(0,82,159,.12);
    }
    header .brand-badge:hover { 
      background: var(--primary); 
      color: var(--white); 
      transform: translateX(-3px) translateY(-1px); 
      box-shadow: 0 8px 0 rgba(0,82,159,.20);
    }

    /* Card: Outline tebal + shadow kartun/tempelan */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 22px;
      padding: 24px;
      border: 3px solid rgba(0,82,159,.22);
      box-shadow: 0 14px 0 rgba(0,82,159,.16), 0 22px 50px rgba(0,40,90,.18);
      position: relative;
      overflow: hidden;
    }

    /* Decorative Strip - Biru/Putih/Emas */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: repeating-linear-gradient(
        45deg,
        #ffffff 0 12px,
        var(--gold) 12px 24px,
        var(--primary) 24px 36px
      );
      z-index: 2;
    }

    /* Dekor Sudut (Bola) */
    .card::after {
      content: '⚽';
      position: absolute; bottom: 10px; right: 10px;
      font-size: 1.8rem; opacity: 0.18; pointer-events: none;
    }

    /* Layout Form */
    .top-row { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; position: relative; z-index: 5; }
    .custom-select { position: relative; flex: 1; min-width: 200px; }

    /* Select Button */
    .select-btn {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; padding: 12px 16px; 
      border-radius: 12px; 
      background: #fff;
      cursor: pointer; 
      transition: all .2s ease;
      color: var(--text-dark);
      border: 2px solid rgba(0,82,159,.18);
      box-shadow: 0 8px 0 rgba(0,82,159,.10);
    }
    .select-btn:hover { border-color: rgba(0,82,159,.35); box-shadow: 0 10px 0 rgba(0,82,159,.14); }
    .select-label { font-weight: 700; font-size: 0.9rem; font-family: 'Outfit', sans-serif; }
    
    .caret {
      width: 42px; height: 28px; border-radius: 8px; display: grid; place-items: center;
      font-size: 10px; font-weight: bold;
      transition: transform .2s ease;
      background: var(--gold);
      color: var(--primary);
      box-shadow: 0 6px 0 rgba(253,185,19,.22);
    }
    .custom-select.open .caret { background: var(--primary); color: #fff; transform: rotate(180deg); }

    /* Dropdown Panel */
    .panel {
      position: absolute; left: 0; right: 0; top: calc(100% + 8px);
      background: #fff;
      border-radius: 12px; padding: 6px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
      border: 2px solid rgba(0,82,159,.18);
      transform-origin: top center; opacity: 0; pointer-events: none; transform: translateY(-8px);
      transition: all .2s cubic-bezier(.2,.9,.2,1);
      max-height: 280px; overflow: auto;
      z-index: 100;
    }
    .panel.open { opacity: 1; pointer-events: auto; transform: translateY(0); }

    .option {
      padding: 10px 12px; border-radius: 8px; margin-bottom: 2px; cursor: pointer;
      font-weight: 600; font-size: 0.85rem; color: var(--text-dark);
      transition: all .1s;
    }
    .option:hover { background: rgba(219,234,254,.65); color: var(--primary); }
    .option.selected { 
      background: linear-gradient(90deg, rgba(253,185,19,.18), rgba(255,255,255,1)); 
      color: var(--primary); 
      border-left: 4px solid var(--gold); 
    }

    /* Editor Textarea */
    .editor-wrap { margin-top: 0; position: relative; }
    textarea.editor {
      width: 100%; min-height: 350px; padding: 16px; border-radius: 14px;
      border: 2px solid #cbd5e1;
      background: #ffffff; 
      resize: vertical; 
      font-family: 'Poppins', sans-serif; font-size: 0.85rem; line-height: 1.6; color: #334155;
      transition: all .2s ease;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.03);
    }
    textarea.editor:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0,82,159,.16); }

    /* Bottom Actions */
    .bottom-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
    
    .hint { 
      font-size: 0.75rem; color: var(--text-muted); 
      background: rgba(255,255,255,0.7); padding: 6px 12px; border-radius: 8px;
    }

    .btn-copy {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff; border: none; padding: 12px 24px; border-radius: 12px;
      cursor: pointer; font-weight: 700; font-size: 0.9rem; font-family: 'Outfit', sans-serif;
      box-shadow: 0 10px 0 rgba(0,82,159,.18);
      transition: all .2s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-copy:hover { transform: translateY(-2px); box-shadow: 0 12px 0 rgba(0,82,159,.22); filter: brightness(1.05); }
    .btn-copy:active { transform: translateY(1px); box-shadow: 0 6px 0 rgba(0,82,159,.18); }

    /* Small screens */
    @media (max-width: 500px){
      .top-row { flex-direction: column; align-items: stretch; }
      .bottom-bar { flex-direction: column; gap: 12px; align-items: stretch; }
      .hint { text-align: center; }
      .btn-copy { width: 100%; justify-content: center; }
    }

    /* Toast Notification */
    .tiny-toast-custom {
      background: linear-gradient(90deg, var(--primary), var(--primary-dark)) !important;
      border: 1px solid #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2) !important;
      font-weight: 600;
    }

    /* =========================================================
       OVERLAY LOCK (TIDAK DIHAPUS, DISESUAIKAN TEMA)
       ========================================================= */
    #promoLockOverlay{
      position: fixed;
      inset: 0;
      display: none;
      z-index: 99999;
      padding: 18px;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 18% 22%, rgba(0,82,159,.20), transparent 42%),
        radial-gradient(circle at 78% 28%, rgba(253,185,19,.16), transparent 48%),
        radial-gradient(circle at 50% 105%, rgba(91,46,144,.14), transparent 40%),
        linear-gradient(135deg, #ffffff 0%, #eef6ff 35%, #dbeafe 100%);
      overflow: hidden;
    }

    #promoLockOverlay .lock-card{
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 2;
      text-align: center;
      overflow: hidden;
      padding: 24px 18px 18px;
      border-radius: 22px;
      border: 3px solid rgba(0,82,159,.22);
      box-shadow: 0 16px 0 rgba(0,82,159,.14), 0 22px 55px rgba(0,40,90,.22);
      background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.58));
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      animation: cardPop .35s ease-out;
    }

    #promoLockOverlay .lock-card::before{
      content:'';
      position:absolute;
      top:0; left:0; right:0;
      height: 10px;
      background: repeating-linear-gradient(
        45deg,
        #ffffff 0 12px,
        var(--gold) 12px 24px,
        var(--primary) 24px 36px
      );
      box-shadow: 0 10px 22px rgba(0,82,159,.12);
    }

    #promoLockOverlay h2{
      margin: 16px 0 6px;
      font-family:'Outfit',sans-serif;
      font-size: 1.25rem;
      letter-spacing: .2px;
      color: var(--primary); 
      text-shadow: 0 2px 0 rgba(253,185,19,.25);
    }

    #promoLockOverlay p{
      margin: 8px 0;
      font-size: .92rem;
      line-height: 1.55;
      color: rgba(10,27,46,.82);
    }

    #promoLockOverlay .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 2px solid rgba(253,185,19,.55);
      background: linear-gradient(180deg, rgba(253,185,19,.22), rgba(255,255,255,.60));
      color: #6b4a00;
      font-weight: 900;
      font-size: .86rem;
      font-family:'Outfit',sans-serif;
      box-shadow: 0 10px 22px rgba(253,185,19,.12), 0 0 0 1px rgba(255,255,255,.06) inset;
      position: relative;
      overflow: hidden;
    }

    #promoLockOverlay .mini{
      margin-top: 12px;
      font-size: .82rem;
      font-weight: 650;
      color: rgba(10,27,46,.78);
    }

    @keyframes cardPop{
      from { transform: translateY(10px) scale(.98); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }
  </style>
</head>

    // Mengganti storage key agar memuat data list yang baru
    const STORAGE_KEY = 'diptarm_formats_v3';

    function loadTemplates(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
        const parsed = JSON.parse(raw);
        return {...JSON.parse(JSON.stringify(DEFAULT_TEMPLATES)), ...parsed};
      }catch(e){
        return JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
      }
    }
    function saveTemplates(obj){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); }catch(e){} }

    // DOM refs
    const panel = document.getElementById('panel');
    const selectBtn = document.getElementById('selectBtn');
    const selectLabel = document.getElementById('selectLabel');
    const editor = document.getElementById('editor');
    const copyBtn = document.getElementById('copyBtn');
    const customSelect = document.getElementById('customSelect');

    let templates = loadTemplates();
    let ids = Object.keys(templates);
    let currentId = ids[0] || 'setup-acc';

    function renderOptions(){
      panel.innerHTML = '';
      ids = Object.keys(templates);
      ids.forEach(id => {
        const opt = document.createElement('div');
        opt.className = 'option';
        opt.setAttribute('data-id', id);
        opt.setAttribute('role','option');
        opt.tabIndex = 0;
        opt.innerHTML = `<div class="title">${templates[id].title}</div>`;
        panel.appendChild(opt);

        opt.addEventListener('click', ()=> selectTemplate(id));
      });
      highlightSelectedOption();
    }

    function selectTemplate(id){
      if(!id || !templates[id]) return;
      currentId = id;
      selectLabel.textContent = templates[id].title;
      editor.value = templates[id].body || '';
      highlightSelectedOption();
      closePanel();
      flashCard();
    }

    // initial render
    renderOptions();

    function loadCurrent(){
      if(!templates[currentId]) currentId = Object.keys(templates)[0];
      selectLabel.textContent = templates[currentId].title;
      editor.value = templates[currentId].body || '';
      highlightSelectedOption();
    }
    loadCurrent();

    function openPanel(){
      panel.classList.add('open');
      customSelect.classList.add('open');
      selectBtn.setAttribute('aria-expanded','true');
    }
    function closePanel(){
      panel.classList.remove('open');
      customSelect.classList.remove('open');
      selectBtn.setAttribute('aria-expanded','false');
    }

    let panelOpen = false;
    selectBtn.addEventListener('click', (e)=>{
      e.stopPropagation();
      panelOpen = panel.classList.contains('open');
      panelOpen ? (closePanel(), panelOpen=false) : (openPanel(), panelOpen=true);
    });

    document.addEventListener('click', (e)=>{
      const target = e.target;
      if(panel.classList.contains('open') && !panel.contains(target) && !selectBtn.contains(target)){
        closePanel();
      }
    });

    function highlightSelectedOption(){
      panel.querySelectorAll('.option').forEach(opt=>{
        opt.classList.toggle('selected', opt.getAttribute('data-id') === currentId);
      });
    }

    // autosave editor
    let tmr;
    editor.addEventListener('input', ()=>{
      clearTimeout(tmr);
      tmr = setTimeout(()=>{
        templates[currentId].body = editor.value;
        saveTemplates(templates);
      },550);
    });

    // copy
    copyBtn.addEventListener('click', async ()=>{
      try{
        await navigator.clipboard.writeText(editor.value);
        tinyToast('Disalin ke clipboard! ⚽');
      }catch(e){
        const ta = document.createElement('textarea'); ta.value = editor.value; document.body.appendChild(ta); ta.select();
        try{ document.execCommand('copy'); tinyToast('Disalin ke clipboard! ⚽'); }catch(err){ tinyToast('Gagal menyalin'); }
        ta.remove();
      }
    });

    function tinyToast(msg){
      const el = document.createElement('div'); el.textContent = msg;
      el.className = 'tiny-toast-custom';
      Object.assign(el.style,{position:'fixed',right:'18px',bottom:'18px',color:'#fff',padding:'12px 18px',borderRadius:'99px',zIndex:9999, fontSize:'0.85rem'});
      document.body.appendChild(el);
      setTimeout(()=> el.remove(),1500);
    }

    function flashCard(){
      const card = document.getElementById('cardRoot');
      card.style.transition = 'transform .2s ease';
      card.style.transform = 'scale(0.99)';
      setTimeout(()=>{ card.style.transform='scale(1)'; },200);
    }

    window.addEventListener('resize', ()=>{ closePanel(); });
    window.addEventListener('beforeunload', ()=> saveTemplates(templates));
  </script>

  <script>
    (function promoDateLockWIB(){
      const startUTC = Date.UTC(2025, 11, 24, 17, 0, 0);   
      const endUTC   = Date.UTC(2028, 11, 31, 16, 59, 59); 
      const nowUTC = Date.now();

      const inRange = (nowUTC >= startUTC && nowUTC <= endUTC);

      const wrap = document.querySelector('.wrap');
      const overlay = document.getElementById('promoLockOverlay');

      if(!inRange){
        if(wrap) wrap.style.display = 'none';
        if(overlay){
          overlay.style.display = 'flex';
          overlay.setAttribute('aria-hidden', 'false');
        }
      } else {
        if(wrap) wrap.style.display = '';
        if(overlay){
          overlay.style.display = 'none';
          overlay.setAttribute('aria-hidden', 'true');
        }
      }
    })();
  </script>
