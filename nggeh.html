<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiptARM Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0b2a6f;
      --navy-2: #1d4ed8;
      --ice: #f6f8ff;
      --white: #ffffff;
      --gold: #d4af37;
      --red: #a50019;
      --ink: #0b2a6f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      background: linear-gradient(180deg, #eef3ff 0%, #e6ebf7 100%);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
    }

    .admin-panel {
      width: 100%;
      max-width: 620px;
      background: linear-gradient(180deg, #ffffff 0%, #f9fbff 100%);
      border: 3px solid var(--navy);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 12px 0 var(--navy), 0 18px 40px rgba(11, 42, 111, 0.12);
      position: relative;
      overflow: hidden;
    }

    .admin-panel::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 7px;
      background: linear-gradient(90deg, var(--gold), #ffffff 50%, var(--red));
    }

    h2 {
      margin: 6px 0 16px;
      text-align: center;
      color: var(--navy);
      font-family: 'Orbitron', sans-serif;
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .mode-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      padding: 6px;
      border: 2px solid var(--navy);
      border-radius: 16px;
      background: #eef2ff;
    }

    .mode-btn {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 11px 8px;
      cursor: pointer;
      background: transparent;
      color: var(--navy);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 800;
      transition: 0.18s;
    }

    .mode-btn.active { background: var(--navy); color: #fff; }

    .form-section {
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e8edf8;
    }

    .form-section h4 {
      margin: 4px 0 10px;
      color: var(--red);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 900;
    }

    .grid-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .form-group { margin-bottom: 10px; }

    label {
      display: block;
      margin-bottom: 6px;
      color: #20335f;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input[type="text"], textarea, input[type="file"], input[type="color"] {
      width: 100%;
      border: 2px solid #cfd8ea;
      border-radius: 12px;
      padding: 11px 12px;
      background: #fff;
      color: #10213f;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: 0.2s;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 4px rgba(165, 0, 25, 0.08);
    }

    textarea {
      resize: vertical;
      min-height: 92px;
    }

    input[type="color"] {
      min-height: 42px;
      padding: 4px;
    }

    .upload-block {
      border: 1px solid #e2e8f4;
      border-radius: 16px;
      background: #fff;
      padding: 12px;
      margin-bottom: 12px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      flex: 1;
      border: 2px solid var(--navy);
      border-radius: 14px;
      padding: 13px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.8px;
      transition: 0.15s;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-reset {
      background: #fff;
      color: var(--navy);
      box-shadow: 0 5px 0 var(--navy);
    }

    .btn-download {
      background: linear-gradient(135deg, var(--navy), #081d4d);
      color: #fff;
      box-shadow: 0 5px 0 #000;
    }

    .canvas-wrap {
      width: 100%;
      max-width: 620px;
      display: flex;
      justify-content: center;
    }

    canvas {
      max-width: 100%;
      height: auto;
      border: 4px solid var(--navy);
      border-radius: 16px;
      background: #000;
    }

    .hidden { display: none; }
    .hint {
      margin-top: 8px;
      font-size: 10px;
      color: var(--navy);
      text-align: center;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="admin-panel">
    <h2>DIPTARM EDITOR</h2>

    <div class="mode-selector">
      <button type="button" class="mode-btn active" onclick="switchMode('SINGLE', this)">SINGLE</button>
      <button type="button" class="mode-btn" onclick="switchMode('MOODBOARD', this)">MOODBOARD</button>
      <button type="button" class="mode-btn" onclick="switchMode('SETUP', this)">SETUP</button>
    </div>

    <div class="form-section">
      <div class="form-group">
        <label>Text Judul:</label>
        <input type="text" id="topText" value="">
      </div>
    </div>

    <div class="form-section">
      <h4>Konten</h4>

      <div id="input-SINGLE" class="mode-input">
        <div class="upload-block">
          <div class="form-group" style="margin-bottom:0;">
            <label>Upload Gambar Utama:</label>
            <input type="file" id="imageInput" accept="image/*">
          </div>
        </div>
      </div>

      <div id="input-MOODBOARD" class="mode-input hidden">
        <div class="upload-block">
          <div class="form-group" style="margin-bottom:0;">
            <label>Header WA:</label>
            <input type="file" id="input-wa" accept="image/*">
          </div>
        </div>
        <div class="upload-block">
          <div class="grid-row">
            <div class="form-group"><label>F1:</label><input type="file" id="input-1" accept="image/*"></div>
            <div class="form-group"><label>F2:</label><input type="file" id="input-2" accept="image/*"></div>
            <div class="form-group"><label>F3:</label><input type="file" id="input-3" accept="image/*"></div>
          </div>
          <div class="grid-row">
            <div class="form-group"><label>F4:</label><input type="file" id="input-4" accept="image/*"></div>
            <div class="form-group"><label>F5:</label><input type="file" id="input-5" accept="image/*"></div>
            <div class="form-group"><label>F6:</label><input type="file" id="input-6" accept="image/*"></div>
          </div>
        </div>
      </div>

      <div id="input-SETUP" class="mode-input hidden">
        <div class="upload-block">
          <div class="form-group"><label>Profil:</label><input type="file" id="up-pp"></div>
        </div>
        <div class="upload-block">
          <div class="form-group"><label>Header:</label><input type="file" id="up-header"></div>
        </div>
        <div class="upload-block">
          <div class="grid-row">
            <div class="form-group"><label>Katalog 1:</label><input type="file" id="up-k1"></div>
            <div class="form-group"><label>Katalog 2:</label><input type="file" id="up-k2"></div>
            <div class="form-group"><label>Katalog 3:</label><input type="file" id="up-k3"></div>
          </div>
          <div class="grid-row">
            <div class="form-group"><label>Katalog 4:</label><input type="file" id="up-k4"></div>
            <div class="form-group"><label>Katalog 5:</label><input type="file" id="up-k5"></div>
            <div class="form-group"><label>Katalog 6:</label><input type="file" id="up-k6"></div>
          </div>
        </div>
        <div class="upload-block">

        </div>
        <div class="form-group"><label>PdN:</label><input type="text" id="input-name" value=''></div>
        <div class="form-group"><label>Desc:</label><textarea id="input-desc" rows="4"></textarea></div>
        <div class="form-group"><label>Loc:</label><input type="text" id="input-loc" value=""></div>
        <div class="form-group"><label>Fake Instagram:</label><input type="text" id="input-ig" value=""></div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-group">
        <label>Warna Tema (Header/Footer):</label>
        <input type="color" id="themeColor" value="#0b2a6f">
        <div class="hint">Klik kanvas untuk ambil warna otomatis.</div>
      </div>
    </div>

    <div class="btn-group">
      <button type="button" class="btn btn-reset" onclick="resetAll()">RESET</button>
      <button type="button" class="btn btn-download" onclick="downloadImage()">DOWNLOAD</button>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="resultCanvas"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('resultCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    // SCALE FACTOR HD
    const HD_SCALE = 4;

    let currentMode = 'SINGLE';
    let images = {
      SINGLE: null,
      wa: null,
      1: null,
      2: null,
      3: null,
      4: null,
      5: null,
      6: null,
      header: null,
      pp: null,
      k1: null,
      k2: null,
      k3: null,
      k4: null,
      k5: null,
      k6: null
    };

    const logo = new Image();
    logo.src = 'logo2.png';
    logo.onload = () => generate();
    logo.onerror = () => generate();

    const imgKatalog = new Image();
    imgKatalog.src = 'katalog.png';

    const iconMsg = "M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.2L4 17.2V4h16v12z";
    const iconShare = "M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z";
    const iconPin = "M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z";
    const iconInsta = "M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2m-.2 2A3.6 3.6 0 0 0 4 7.6v8.8C4 18.39 5.61 20 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6C20 5.61 18.39 4 16.4 4H7.6m9.65 1.5a1.25 1.25 0 0 1 1.25 1.25A1.25 1.25 0 0 1 17.25 8 1.25 1.25 0 0 1 16 6.75a1.25 1.25 0 0 1 1.25-1.25M12 7a5 5 0 0 1 5 5 5 5 0 0 1-5 5 5 5 0 0 1-5-5 5 5 0 0 1 5-5m0 2a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3z";
    const fallbackKatalog = "M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z";

    function switchMode(mode, btn) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));
      if (btn) btn.classList.add('active');
      document.querySelectorAll('.mode-input').forEach(el => el.classList.add('hidden'));
      document.getElementById('input-' + mode).classList.remove('hidden');

      const title = document.getElementById('topText');
      if (mode === 'MOODBOARD') title.value = 'MOODBOARD';
      else if (mode === 'SETUP') title.value = 'PAKET';
      else title.value = '';
      generate();
    }

    function handleUpload(inputId, storageKey) {
      const el = document.getElementById(inputId);
      if (!el) return;
      el.addEventListener('change', e => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = event => {
          const img = new Image();
          img.onload = () => { images[storageKey] = img; generate(); };
          img.onerror = () => { images[storageKey] = null; generate(); };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    handleUpload('imageInput', 'SINGLE');
    handleUpload('input-wa', 'wa');
    handleUpload('input-1', 1);
    handleUpload('input-2', 2);
    handleUpload('input-3', 3);
    handleUpload('input-4', 4);
    handleUpload('input-5', 5);
    handleUpload('input-6', 6);
    handleUpload('up-header', 'header');
    handleUpload('up-pp', 'pp');
    handleUpload('up-k1', 'k1');
    handleUpload('up-k2', 'k2');
    handleUpload('up-k3', 'k3');
    handleUpload('up-k4', 'k4');
    handleUpload('up-k5', 'k5');
    handleUpload('up-k6', 'k6');

    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      const x = Math.max(0, Math.min(canvas.width - 1, (e.clientX - rect.left) * (canvas.width / rect.width)));
      const y = Math.max(0, Math.min(canvas.height - 1, (e.clientY - rect.top) * (canvas.height / rect.height)));
      const p = ctx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
      const hex = '#' + ('000000' + ((p[0] << 16) | (p[1] << 8) | p[2]).toString(16)).slice(-6);
      document.getElementById('themeColor').value = hex;

      generate();
    });

    function resetAll() {
      images = {
        SINGLE: null,
        wa: null,
        1: null,
        2: null,
        3: null,
        4: null,
        5: null,
        6: null,
        header: null,
        pp: null,
        k1: null,
        k2: null,
        k3: null,
        k4: null,
        k5: null,
        k6: null
      };

      document.querySelectorAll('input[type="file"]').forEach(i => i.value = '');
      document.getElementById('themeColor').value = '#0b2a6f';

      document.getElementById('topText').value = '';
      document.getElementById('input-name').value = '';
      document.getElementById('input-desc').value = '';
      document.getElementById('input-loc').value = '';
      document.getElementById('input-ig').value = '';
      currentMode = 'SINGLE';
      document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));
      const singleBtn = document.querySelector('.mode-btn');
      if (singleBtn) singleBtn.classList.add('active');
      document.querySelectorAll('.mode-input').forEach(el => el.classList.add('hidden'));
      document.getElementById('input-SINGLE').classList.remove('hidden');
      generate();
    }

    function generate() {
      const topTxt = String(document.getElementById('topText').value || '').trim().toUpperCase();
      const themeSingle = document.getElementById('themeColor').value || '#0b2a6f';

      if (currentMode === 'SINGLE') renderPictureMode(topTxt, themeSingle);
      else if (currentMode === 'MOODBOARD') renderMBMode(topTxt, themeSingle);
      else renderSetupMode(topTxt, themeSingle);
    }

    function drawCover(img, x, y, w, h) {
      if (!img) {
        ctx.fillStyle = '#151515';
        ctx.fillRect(x, y, w, h);
        return;
      }
      const r = img.width / img.height;
      const cr = w / h;
      let sx, sy, sw, sh;
      if (r > cr) {
        sh = img.height;
        sw = img.height * cr;
        sx = (img.width - sw) / 2;
        sy = 0;
      } else {
        sw = img.width;
        sh = img.width / cr;
        sx = 0;
        sy = (img.height - sh) / 2;
      }
      ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }

    function drawLogo(x, y, w, h) {
      if (!(logo.complete && logo.naturalWidth > 0)) return;
      const logoW = w * 0.7;
      const ratio = logo.height / logo.width || 1;
      const logoH = logoW * ratio;
      const shiftLeft = w * 0.21;
      ctx.drawImage(logo, (x + (w / 2) - (logoW / 2)) - shiftLeft, y + (h / 2) - (logoH / 2), logoW, logoH);
    }

    function drawBase(w, h, hH, color, top) {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, w, hH);
      ctx.fillRect(0, h - hH, w, hH);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `900 ${Math.max(16, hH * 0.5)}px Orbitron`;
      ctx.lineJoin = 'round';
      ctx.lineWidth = 0.7;
      ctx.strokeStyle = '#FFFFFF';
      ctx.fillStyle = '#FFFFFF';
      ctx.strokeText(`" ${top} "`, w / 2, hH / 2);
      ctx.fillText(`" ${top} "`, w / 2, hH / 2);
      ctx.strokeText('" RESULT DIPTARM STORE "', w / 2, h - hH / 2);
      ctx.fillText('" RESULT DIPTARM STORE "', w / 2, h - hH / 2);
    }

    function renderPictureMode(top, color) {
      const img = images.SINGLE;
      const width = img ? img.width : 500;
      const imgH = img ? img.height : 0;
      const pad = img ? width * 0.05 : 25;
      const barH = Math.max(56, Math.round((width + pad * 2) * 0.10));
      const logicalW = img ? (width + pad * 2) : 600;
      const contentHeight = img ? (imgH + 20) : 0;
      const logicalH = barH + pad + contentHeight + barH + pad;

      // HD SCALING
      canvas.width = logicalW * HD_SCALE;
      canvas.height = logicalH * HD_SCALE;
      ctx.scale(HD_SCALE, HD_SCALE);

      drawBase(logicalW, logicalH, barH, color, top);
      if (img) {
        drawCover(img, pad, barH + pad, logicalW - pad * 2, imgH);
        drawLogo(pad, barH + pad, logicalW - pad * 2, imgH);
      }
    }

    function renderMBMode(top, color) {
      const logicalW = 600;
      const padding = logicalW * 0.05;
      const contentW = logicalW - (padding * 2);
      const headerH = Math.max(56, Math.round(logicalW * 0.10));
      const waH = contentW * 0.5;
      const gridH = contentW / 3;
      const hasWA = !!images.wa;
      const hasRow1 = !!(images[1] || images[2] || images[3]);
      const hasRow2 = !!(images[4] || images[5] || images[6]);
      let contentH = 0;
      if (hasWA) contentH += waH;
      if (hasRow1) contentH += gridH;
      if (hasRow2) contentH += gridH;
      
      const logicalH = headerH * 2 + (padding * 2) + contentH;

      // HD SCALING
      canvas.width = logicalW * HD_SCALE;
      canvas.height = logicalH * HD_SCALE;
      ctx.scale(HD_SCALE, HD_SCALE);

      drawBase(logicalW, logicalH, headerH, color, top);
      let currentY = headerH + padding;
      const contentStartY = currentY;
      let drawnHeight = 0;
      if (hasWA) { drawCover(images.wa, padding, currentY, contentW, waH); currentY += waH; drawnHeight += waH; }
      if (hasRow1) {
        for (let i = 0; i < 3; i++) {
          const x = padding + (i * gridH);
          if (images[i + 1]) drawCover(images[i + 1], x, currentY, gridH, gridH);
        }
        currentY += gridH;
        drawnHeight += gridH;
      }
      if (hasRow2) {
        for (let i = 0; i < 3; i++) {
          const x = padding + (i * gridH);
          if (images[i + 4]) drawCover(images[i + 4], x, currentY, gridH, gridH);
        }
        currentY += gridH;
        drawnHeight += gridH;
      }
      if (drawnHeight > 0) drawLogo(padding, contentStartY, contentW, drawnHeight);
    }

    function drawIcon(source, x, y, sz, col) {
      if (source instanceof HTMLImageElement && source.complete && source.naturalWidth > 0) {
        ctx.drawImage(source, x, y, sz, sz);
      } else {
        const path = (source instanceof HTMLImageElement) ? fallbackKatalog : source;
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(sz / 24, sz / 24);
        ctx.fillStyle = col;
        ctx.fill(new Path2D(path));
        ctx.restore();
      }
    }

    function tokenizeStyledParagraph(paragraph) {
      const tokens = paragraph.match(/(\*[^*\n]+\*|_[^_\n]+_|~[^~\n]+~|`[^`\n]+`|\S+|\s+)/g) || [];
      const segs = [];
      tokens.forEach(tok => {
        if (/^\s+$/.test(tok)) {
          segs.push({ text: tok, space: true, bold: false, italic: false, strike: false, code: false });
          return;
        }
        let bold = false, italic = false, strike = false, code = false;
        let txt = tok;
        if (tok.startsWith('*') && tok.endsWith('*')) { bold = true; txt = tok.slice(1, -1); }
        else if (tok.startsWith('_') && tok.endsWith('_')) { italic = true; txt = tok.slice(1, -1); }
        else if (tok.startsWith('~') && tok.endsWith('~')) { strike = true; txt = tok.slice(1, -1); }
        else if (tok.startsWith('`') && tok.endsWith('`')) { code = true; txt = tok.slice(1, -1); }
        const parts = txt.split(/(\s+)/);
        parts.forEach(part => {
          if (!part) return;
          segs.push({ text: part, space: /^\s+$/.test(part), bold, italic, strike, code });
        });
      });
      return segs;
    }

    function segmentFont(seg, size) {
      const weight = seg.bold ? 900 : 500;
      const italic = seg.italic ? 'italic ' : '';
      const family = seg.code ? "'Noto Sans Mono', monospace" : "'Noto Sans', Inter, sans-serif";
      return `${italic}${weight} ${size}px ${family}`;
    }

    function measureStyledWrappedLines(txt, maxW, size) {
      const paras = (txt || '').split('\n');
      let total = 0;
      paras.forEach((p) => {
        if (p.trim() === '') { total++; return; }
        const segs = tokenizeStyledParagraph(p);
        let lineWidth = 0;
        segs.forEach(seg => {
          ctx.font = segmentFont(seg, size);
          const w = ctx.measureText(seg.text).width;
          if (seg.space && lineWidth === 0) return;
          if (!seg.space && lineWidth > 0 && lineWidth + w > maxW) { total++; lineWidth = 0; }
          lineWidth += w;
        });
        total++;
      });
      return Math.max(total, 1);
    }

    function drawSetupName(name, x, y, maxW) {
      const txt = String(name || '').trim();
      if (!txt) return;

      let size = 18;
      while (size > 11) {
        ctx.font = `900 ${size}px Inter`;
        if (ctx.measureText(txt).width <= maxW) break;
        size -= 1;
      }
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#000';
      ctx.font = `650 ${size}px Inter`;
      ctx.fillText(txt, x, y);
      ctx.restore();
    }

    function drawStyledWrappedText(txt, x, y, maxW, lineH, size, color, align = 'left') {
      const paras = (txt || '').split('\n');
      const prevFill = ctx.fillStyle;
      const prevAlign = ctx.textAlign;
      const prevBaseline = ctx.textBaseline;
      ctx.fillStyle = color;
      ctx.textBaseline = 'alphabetic';
      let curY = y;
      paras.forEach((p) => {
        if (p.trim() === '') { curY += lineH; return; }
        const segs = tokenizeStyledParagraph(p);
        const lines = [];
        let line = [];
        let lineWidth = 0;
        segs.forEach(seg => {
          ctx.font = segmentFont(seg, size);
          const w = ctx.measureText(seg.text).width;
          if (seg.space && line.length === 0) return;
          if (!seg.space && line.length > 0 && lineWidth + w > maxW) {
            lines.push({ segments: line, width: lineWidth });
            line = [];
            lineWidth = 0;
          }
          line.push({ ...seg, width: w });
          lineWidth += w;
        });
        lines.push({ segments: line, width: lineWidth });
        lines.forEach(ln => {
          let curX = x;
          if (align === 'center') curX = x - (ln.width / 2);
          if (align === 'right') curX = x - ln.width;
          ln.segments.forEach(seg => {
            if (seg.space) { curX += seg.width; return; }
            ctx.font = segmentFont(seg, size);
            ctx.fillStyle = color;
            ctx.fillText(seg.text, curX, curY);
            if (seg.strike) {
              ctx.save();
              ctx.beginPath();
              ctx.moveTo(curX, curY - size * 0.32);
              ctx.lineTo(curX + seg.width, curY - size * 0.32);
              ctx.lineWidth = Math.max(1.5, size * 0.08);
              ctx.strokeStyle = color;
              ctx.stroke();
              ctx.restore();
            }
            curX += seg.width;
          });
          curY += lineH;
        });
      });
      ctx.fillStyle = prevFill;
      ctx.textAlign = prevAlign;
      ctx.textBaseline = prevBaseline;
      return curY;
    }

    function drawCatalogRow(keys, xStart, y, size, gap) {
      for (let i = 0; i < keys.length; i++) {
        const key = keys[i];
        const x = xStart + (size + gap) * i;
        if (images[key]) {
          ctx.save();
          ctx.beginPath();
          ctx.roundRect(x, y, size, size, 12);
          ctx.clip();
          drawCover(images[key], x, y, size, size);
          ctx.restore();
        }
      }
    }

    function renderSetupMode(top, theme) {
      const W = 600;
      const barH = 70;
      const pad = W * 0.05;
      const innerW = W - (pad * 2);
      const descTxt = document.getElementById('input-desc').value || '';
      const locTxt = document.getElementById('input-loc').value || '';
      const igTxt = document.getElementById('input-ig').value || '';
      const nameTxt = document.getElementById('input-name').value || '';
      const showHeader = !!images.header;
      const showPP = !!images.pp;
      const showName = (nameTxt || '').trim().length > 0;
      const showButtons = showPP || showName;
      const showCatalogs = ['k1','k2','k3','k4','k5','k6'].some(k => images[k]);
      const showDesc = (descTxt || '').trim().length > 0;
      const showLoc = (locTxt || '').trim().length > 0;
      const showIg = (igTxt || '').trim().length > 0;
      const descLines = showDesc ? measureStyledWrappedLines(descTxt, innerW - 110, 18) : 0;
      const locLines = showLoc ? measureStyledWrappedLines(locTxt, innerW - 110, 18) : 0;
      const ppS = 150;
      
      let y = barH + pad;
      if (showHeader) y += 220;
      if (showPP) {
        const ppY = showHeader ? (barH + pad + 220 - 90) : (y + 20);
        const nameY = ppY + ppS + 50;
        y = nameY + 35;
      } else if (showName) {
        const nameY = y + 25;
        y = nameY + 35;
      }
      if (showButtons) y += 15 + 55 + 35;
      if (showCatalogs) {
        y += 10;
        y += 20;
        const row1 = ['k1', 'k2', 'k3'];
        const row2 = ['k4', 'k5', 'k6'];
        if (row1.some(k => images[k])) { y += 15 + 160; if (row2.some(k => images[k])) y += 12; }
        if (row2.some(k => images[k])) y += 160;
        y += 25;
      }
      if (showDesc) y += 45 + (descLines * 26) + 15;
      if (showLoc) y += 55 + (locLines * 26) + 15;
      if (showIg) y += 40 + 10;

      const logicalH = y + barH + pad;

      // HD SCALING
      canvas.width = W * HD_SCALE;
      canvas.height = logicalH * HD_SCALE;
      ctx.scale(HD_SCALE, HD_SCALE);

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, logicalH);
      ctx.fillStyle = theme;
      ctx.fillRect(0, 0, W, barH);
      ctx.fillRect(0, logicalH - barH, W, barH);
      ctx.fillStyle = '#FFF';
      ctx.fillRect(pad, barH + pad, innerW, y - (barH + pad) + 5);
      
      let cy = barH + pad;
      const contentX = pad;
      
      if (showHeader) {
        drawCover(images.header, contentX, cy, innerW, 220);
        cy += 220;
      }
      if (showPP) {
        const ppY = showHeader ? (barH + pad + 220 - 90) : (cy + 20);
        ctx.save();
        ctx.beginPath();
        ctx.arc(W / 2, ppY + ppS / 2, ppS / 2, 0, Math.PI * 2);
        ctx.clip();
        drawCover(images.pp, W / 2 - ppS / 2, ppY, ppS, ppS);
        ctx.restore();
        ctx.save();
        ctx.beginPath();
        ctx.arc(W / 2, ppY + ppS / 2, ppS / 2, 0, Math.PI * 2);
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 6;
        ctx.stroke();
        ctx.restore();
        if (showName) {
          drawSetupName(nameTxt, W / 2, ppY + ppS + 43, innerW - 50);
        }
        cy = ppY + ppS + 80;
      } else if (showName) {
        drawSetupName(nameTxt, W / 2, cy + 20, innerW - 50);
        cy += 55;
      }
      if (showButtons) {
        const btnY = cy;
        const bW = 155;
        const bStartX = pad + (innerW - (bW * 3 + 24)) / 2;
        const btnIcons = [iconMsg, imgKatalog, iconShare];
        const btnLabels = ['Kirim pesan', 'Katalog', 'Bagikan'];
        for (let i = 0; i < 3; i++) {
          const bx = bStartX + (bW + 12) * i;
          ctx.strokeStyle = '#ddd';
          ctx.fillStyle = '#FFF';
          ctx.beginPath();
          ctx.roundRect(bx, btnY, bW, 55, 12);
          ctx.fill();
          ctx.stroke();
          drawIcon(btnIcons[i], bx + (bW / 2) - 10, btnY + 12, 20, '#111');
          ctx.fillStyle = '#111';
          ctx.font = '600 13px Inter';
          ctx.textAlign = 'center';
          ctx.fillText(btnLabels[i], bx + bW / 2, btnY + 45);
        }
        cy = btnY + 55 + 35;
      }
      if (showCatalogs) {
        const katY = cy + 20;
        ctx.fillStyle = '#f8f9fa';
        ctx.fillRect(pad, cy, innerW, 10);
        ctx.textAlign = 'left';
        ctx.fillStyle = '#666';
        ctx.font = '700 15px Inter';
        ctx.fillText('Produk', pad + 25, katY);
        ctx.textAlign = 'right';
        ctx.font = '500 13px Inter';
        ctx.fillText('LIHAT SEMUA >', pad + innerW - 25, katY);
        const kS = 160;
        const kGap = 12;
        const kStartX = pad + (innerW - (kS * 3 + 24)) / 2;
        const row1 = ['k1', 'k2', 'k3'];
        const row2 = ['k4', 'k5', 'k6'];
        const row1Has = row1.some(k => images[k]);
        const row2Has = row2.some(k => images[k]);
        let kY = katY + 15;
        if (row1Has) {
          drawCatalogRow(row1, kStartX, kY, kS, kGap);
          kY += kS + (row2Has ? 12 : 25);
        }
        if (row2Has) {
          drawCatalogRow(row2, kStartX, kY, kS, kGap);
          kY += kS + 25;
        }
        cy = kY;
        ctx.fillStyle = '#f8f9fa';
        ctx.fillRect(pad, cy, innerW, 10);
        cy += 35;
      }
      if (showDesc) {
        const dY = cy + 15;
        ctx.textAlign = 'left';
        drawIcon(imgKatalog, pad + 30, dY - 22, 26, '#888');
        const afterDescY = drawStyledWrappedText(descTxt, pad + 75, dY + 5, innerW - 110, 26, 18, '#222', 'left');
        ctx.fillStyle = '#f8f9fa';
        ctx.fillRect(pad, afterDescY + 15, innerW, 8);
        cy = afterDescY + 35;
      }
      if (showLoc) {
        const iY = cy + 20;
        drawIcon(iconPin, pad + 30, iY - 20, 24, '#888');
        ctx.fillStyle = '#006cba';
        ctx.font = '500 18px Inter';
        ctx.textAlign = 'left';
        const afterLocY = drawStyledWrappedText(locTxt, pad + 75, iY + 5, innerW - 110, 26, 18, '#006cba', 'left');
        cy = afterLocY + 10;
      }
      if (showIg) {
        const instaY = cy + 20;
        drawIcon(iconInsta, pad + 30, instaY - 20, 24, '#888');
        ctx.fillStyle = '#111';
        ctx.textAlign = 'left';
        drawStyledWrappedText('Instagram', pad + 75, instaY, innerW - 110, 26, 18, '#111', 'left');
        ctx.textAlign = 'right';
        ctx.fillStyle = '#777';
        drawStyledWrappedText(igTxt, pad + innerW - 30, instaY, innerW - 110, 26, 18, '#777', 'right');
        cy = instaY + 30;
      }
      ctx.textAlign = 'center';
      ctx.fillStyle = '#FFF';
      ctx.strokeStyle = '#FFF';
      ctx.font = '900 28px Orbitron';
      ctx.lineWidth = 0.6;
      const topTitle = `" ${String(top || '').toUpperCase()} "`;
      ctx.fillText(topTitle, W / 2, barH / 2 + 10);
      ctx.strokeText(topTitle, W / 2, barH / 2 + 10);
      const footerTxt = '" RESULT DIPTARM STORE "';
      ctx.fillText(footerTxt, W / 2, logicalH - barH / 2 + 10);
      ctx.strokeText(footerTxt, W / 2, logicalH - barH / 2 + 10);
      if (logo.complete && logo.naturalWidth > 0) {
        const size = 400;
        const x = 0;
        const yLogo = (logicalH / 2) - (size / 2);
        ctx.save();
        ctx.globalAlpha = 0.95;
        ctx.drawImage(logo, x, yLogo, size, size);
        ctx.restore();
      }
    }

    function downloadImage() {
      const link = document.createElement('a');
      link.download = 'DiptARM_HD.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    document.getElementById('topText').addEventListener('input', generate);
    document.getElementById('themeColor').addEventListener('input', generate);
    
    document.getElementById('input-name').addEventListener('input', generate);
    document.getElementById('input-desc').addEventListener('input', generate);
    document.getElementById('input-loc').addEventListener('input', generate);
    document.getElementById('input-ig').addEventListener('input', generate);
    window.addEventListener('load', generate);
  </script>
</body>
