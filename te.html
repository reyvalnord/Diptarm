<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kalkulator Team - DiptARM</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --rm-white: #ffffff;
      --rm-navy: #0b1f44;      
      --rm-navy2: #123066;     
      --rm-gold: #c8a23a;
      --rm-gold2: #f1d37a;
      --rm-blue: #1d4ed8;
      --rm-gray: #6b7280;
      --card-radius: 24px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 40px 16px;
      font-family: 'Poppins', sans-serif;
      color: var(--rm-navy);
      background: linear-gradient(135deg, #f8faff 0%, #eef2ff 100%);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* KOTAK UTAMA */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--rm-white);
      border-radius: var(--card-radius);
      padding: 30px 24px;
      box-shadow: 0 20px 50px rgba(11, 31, 68, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.8);
      position: relative;
      z-index: 1;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      text-align: center;
      margin-bottom: 25px;
      font-size: 1.8rem;
    }

    .toggle-group {
      display: flex;
      background: #f1f5f9;
      border-radius: 16px;
      padding: 5px;
      margin-bottom: 25px;
    }

    .toggle-btn {
      flex: 1;
      border: none;
      background: transparent;
      padding: 12px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      color: var(--rm-gray);
      border-radius: 12px;
      cursor: pointer;
      transition: var(--transition);
    }

    .toggle-btn.active {
      background: var(--rm-navy);
      color: var(--rm-white);
      box-shadow: 0 4px 12px rgba(11, 31, 68, 0.2);
    }

    .input-group {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      background: #fff;
      border: 2px solid #f1f5f9;
      border-radius: 16px;
      padding: 8px 15px;
      transition: var(--transition);
    }

    .input-group:focus-within {
      border-color: var(--rm-blue);
      background: #fdfdff;
    }

    .input-group label {
      flex: 1;
      font-weight: 700;
      font-size: 0.8rem;
      display: flex;
      flex-direction: column;
    }

    .input-group label small { color: var(--rm-gray); font-weight: 400; }

    .input-group input {
      width: 120px;
      font-size: 1rem;
      border: none;
      background: #f8fafc;
      padding: 8px;
      border-radius: 10px;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      color: var(--rm-blue);
      outline: none;
    }

    .hidden { display: none !important; }

    .total-box {
      background: linear-gradient(135deg, var(--rm-navy), var(--rm-navy2));
      border-radius: 20px;
      padding: 22px;
      margin-top: 20px;
      color: #fff;
      border: 1px solid var(--rm-gold);
      position: relative;
      overflow: hidden;
    }

    .result-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.9rem; opacity: 0.9; }
    
    .grand-total {
      font-size: 1.5rem;
      font-weight: 900;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed rgba(255,255,255,0.2);
      color: var(--rm-gold2);
      font-family: 'Outfit', sans-serif;
      opacity: 1;
    }

    .copy-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--rm-gold), #b38f30);
      color: var(--rm-navy);
      border: none;
      padding: 18px;
      border-radius: 16px;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
      margin-top: 15px;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 8px 20px rgba(200, 162, 58, 0.25);
    }

    .copy-btn:active { transform: scale(0.96); }

    /* NOTIFIKASI TOAST CUSTOM */
    #toast {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--rm-navy);
      color: white;
      padding: 16px 24px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      z-index: 9999;
      transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border-bottom: 3px solid var(--rm-gold);
      min-width: 250px;
      justify-content: center;
    }

    #toast.show { top: 20px; }

    .toast-icon {
      background: var(--rm-gold);
      color: var(--rm-navy);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div id="toast">
    <div class="toast-icon">✓</div>
    <span>Rincian Berhasil Disalin!</span>
  </div>

  <div class="card">
    <h1>Kalkulator Crew</h1>

    <div class="toggle-group">
      <button class="toggle-btn active" id="btnTeam">Team</button>
      <button class="toggle-btn" id="btnAdmin">Admin</button>
    </div>

    <div class="input-group">
      <label>LPM <small id="lpmNote">Jumlah Total LPM</small></label>
      <input type="number" id="lpmInput" value="0">
    </div>
    <div class="input-group">
      <label>LPFP <small id="lpfpNote">Jumlah Total LPFP</small></label>
      <input type="number" id="lpfpInput" value="0">
    </div>
    <div class="input-group">
      <label>Fee Foto <small id="fotoNote">Bonus Foto</small></label>
      <input type="number" id="feeFotoInput" value="0">
    </div>
    <div class="input-group">
      <label>Fee Rush/ Video<small id="rushNote">Bonus Inrush/ Video</small></label>
      <input type="number" id="feeRushInput" value="0">
    </div>
    <div class="input-group">
      <label>Dukungan<small id="supportNote">Bonus Jasduk</small></label>
      <input type="number" id="dukunganInput" value="0">
    </div>

    <div id="containerPotongan" class="input-group">
      <label>Potongan <small>Diinput Admin (Rp)</small></label>
      <input type="number" id="potonganInput" value="0">
    </div>

    <div id="containerGajiAdmin" class="input-group hidden">
      <label>Penghasilan Store <small>Persenan Untuk Admin</small></label>
      <input type="number" id="gajiAdminInp" value="0">
    </div>

    <div class="total-box">
      <div class="result-row"><span>Subtotal</span><span id="subtotalLabel">Rp 0</span></div>
      <div id="rowPotongan" class="result-row"><span>Potongan</span><span id="potonganLabel">Rp 0</span></div>
      <div id="rowAdmin" class="result-row hidden"><span>Persenan Admin</span><span id="adminGajiLabel">Rp 0</span></div>
      <div class="result-row grand-total"><span>Total Akhir</span><span id="finalTotalLabel">Rp 0</span></div>
    </div>

    <button class="copy-btn" id="copyBtn">Salin Rincian</button>
  </div>

  <script>
    const lpmInput = document.getElementById('lpmInput');
    const lpfpInput = document.getElementById('lpfpInput');
    const feeFotoInput = document.getElementById('feeFotoInput');
    const feeRushInput = document.getElementById('feeRushInput');
    const dukunganInput = document.getElementById('dukunganInput');
    const potonganInput = document.getElementById('potonganInput');
    const gajiAdminInp = document.getElementById('gajiAdminInp');

    const subtotalLabel = document.getElementById('subtotalLabel');
    const adminGajiLabel = document.getElementById('adminGajiLabel');
    const potonganLabel = document.getElementById('potonganLabel');
    const finalTotalLabel = document.getElementById('finalTotalLabel');

    let mode = 'Team';

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    function updateUI() {
      document.getElementById('containerPotongan').classList.toggle('hidden', mode !== 'Team');
      document.getElementById('rowPotongan').classList.toggle('hidden', mode !== 'Team');
      document.getElementById('containerGajiAdmin').classList.toggle('hidden', mode !== 'Admin');
      document.getElementById('rowAdmin').classList.toggle('hidden', mode !== 'Admin');
      calculate();
    }

    document.getElementById('btnTeam').addEventListener('click', () => { mode = 'Team'; btnTeam.classList.add('active'); btnAdmin.classList.remove('active'); updateUI(); });
    document.getElementById('btnAdmin').addEventListener('click', () => { mode = 'Admin'; btnAdmin.classList.add('active'); btnTeam.classList.remove('active'); updateUI(); });

    function calculate() {
      const lpm = parseInt(lpmInput.value || 0), lpfp = parseInt(lpfpInput.value || 0), foto = parseInt(feeFotoInput.value || 0), rush = parseInt(feeRushInput.value || 0), supp = parseInt(dukunganInput.value || 0), pot = parseInt(potonganInput.value || 0), gajiAdmRaw = parseInt(gajiAdminInp.value || 0);

      let subtotal = 0, finalTotal = 0, hasilAdmin = 0;

      if (mode === 'Team') {
        subtotal = (lpm * 1.6) + (lpfp * 2.4) + (foto * 80) + (rush * 160) + (supp * 120);
        finalTotal = subtotal - pot;
      } else {
        subtotal = (lpm * 2) + (lpfp * 3) + (foto * 100) + (rush * 200) + (supp * 150);
        hasilAdmin = (gajiAdmRaw / 2) * 0.05;
        finalTotal = subtotal + hasilAdmin;
      }

      subtotalLabel.innerText = "Rp " + Math.round(subtotal).toLocaleString('id-ID');
      potonganLabel.innerText = "- Rp " + pot.toLocaleString('id-ID');
      adminGajiLabel.innerText = "Rp " + Math.round(hasilAdmin).toLocaleString('id-ID');
      finalTotalLabel.innerText = "Rp " + Math.round(finalTotal).toLocaleString('id-ID');
    }

    [lpmInput, lpfpInput, feeFotoInput, feeRushInput, dukunganInput, potonganInput, gajiAdminInp].forEach(inp => {
      inp.addEventListener('input', calculate);
      inp.addEventListener('focus', function() { if(this.value === "0") this.value = ""; });
      inp.addEventListener('blur', function() { if(this.value === "") this.value = "0"; });
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      const now = new Date();
      const opsi = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
      const tanggalTxt = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + ", " + now.toLocaleDateString('id-ID', opsi);

      const lpm = parseInt(lpmInput.value || 0), lpfp = parseInt(lpfpInput.value || 0), foto = parseInt(feeFotoInput.value || 0), rush = parseInt(feeRushInput.value || 0), supp = parseInt(dukunganInput.value || 0), pot = parseInt(potonganInput.value || 0), gajiAdmRaw = parseInt(gajiAdminInp.value || 0);

      const sLPM = (mode === 'Team' ? lpm * 1.6 : lpm * 2);
      const sLPFP = (mode === 'Team' ? lpfp * 2.4 : lpfp * 3);
      const sFoto = (mode === 'Team' ? foto * 80 : foto * 100);
      const sRush = (mode === 'Team' ? rush * 160 : rush * 200);
      const sSupp = (mode === 'Team' ? supp * 8 : supp * 150);
      const hAdmin = (gajiAdmRaw / 2) * 0.05;

      let rincian = `*﹙ᵎ﹚𝅄 " ${mode} " ──𝗗𝗜𝗣𝗧𝗔𝗥𝗠 𝗖𝗥𝗘𝗪*\n`;
      rincian += `  _Waktu: ${tanggalTxt}_\n\n`;
      rincian += `❲ 💰 ❳   ⓘ *\`ㅤ𝗥𝗜𝗡𝗖𝗜𝗔𝗡 𝗚𝗔𝗝𝗜ㅤ\`* *🜲\n`;
      
      if(sLPM > 0) rincian += `> Subtotal LPM: Rp ${Math.round(sLPM).toLocaleString('id-ID')}\n`;
      if(sLPFP > 0) rincian += `> Subtotal LPFP: Rp ${Math.round(sLPFP).toLocaleString('id-ID')}\n`;
      if(sFoto > 0) rincian += `> Subtotal Foto: Rp ${Math.round(sFoto).toLocaleString('id-ID')}\n`;
      if(sRush > 0) rincian += `> Subtotal Inrush/ Video: Rp ${Math.round(sRush).toLocaleString('id-ID')}\n`;
      if(sSupp > 0) rincian += `> Subtotal Dukungan: Rp ${Math.round(sSupp).toLocaleString('id-ID')}\n`;
      
      if(mode === 'Team' && pot > 0) {
        rincian += `> Potongan: Rp ${pot.toLocaleString('id-ID')}\n`;
      } else if (mode === 'Admin' && hAdmin > 0) {
        rincian += `> Gaji Admin: Rp ${Math.round(hAdmin).toLocaleString('id-ID')}\n`;
      }

      rincian += `\n*ⓘ  𝗧𝗢𝗧𝗔𝗟 𝗔𝗞𝗛𝗜𝗥: ${finalTotalLabel.innerText}*`;

      navigator.clipboard.writeText(rincian).then(() => {
        showToast();
      });
    });

    calculate();
  </script>
</body>
</html>
