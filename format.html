<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DiptARM Format</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Global Scale & Colors */
    html { font-size: 13px; }

    :root {
      --primary-madrid: #00529F;    /* Royal Blue */
      --secondary-madrid: #FDB913;  /* Madrid Gold */
      --madrid-white: #ffffff;
      --madrid-dark: #0a1b2e;
      --grunge-gray: #e2e8f0;
      
      --radius: 4px; /* Sharper for stamp feel */
    }

    * { box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      /* Background: Grungy Collage Feel */
      background-color: #d1d5db;
      background-image: 
        radial-gradient(circle at 2px 2px, rgba(0,82,159,0.1) 1px, transparent 0),
        linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
      background-size: 24px 24px, 100% 100%;
      min-height: 100vh;
      padding: 30px 20px;
      color: var(--madrid-dark);
      position: relative; 
      overflow-x: hidden;
    }

    /* Decorative Stamps in Background */
    body::before {
      content: "1902";
      position: fixed; top: 10%; right: 5%;
      font-family: 'Outfit'; font-weight: 800; font-size: 8rem;
      color: rgba(0,82,159,0.05); transform: rotate(-15deg);
      pointer-events: none;
    }
    
    body::after {
      content: "HALA MADRID";
      position: fixed; bottom: 5%; left: -2%;
      font-family: 'Outfit'; font-weight: 800; font-size: 6rem;
      color: rgba(253,185,19,0.05); transform: rotate(10deg);
      pointer-events: none;
    }

    .wrap { max-width: 800px; margin: 0 auto; position: relative; z-index: 2; }
    
    /* Header - Stamped Banner Style */
    header { 
      display: flex; align-items: center; gap: 12px; margin-bottom: 25px; 
      padding: 15px; background: var(--primary-madrid);
      border: 4px solid var(--madrid-dark);
      box-shadow: 8px 8px 0px var(--madrid-dark);
      transform: rotate(-1deg);
    }
    header h1 { 
      margin: 0; color: var(--madrid-white); 
      font-family: 'Outfit', sans-serif; font-size: 1.6rem; font-weight: 800;
      letter-spacing: 1px;
    }

    header .brand-badge {
      background: var(--secondary-madrid);
      color: var(--madrid-dark);
      padding: 8px 16px; font-weight: 800; font-size: .8rem;
      text-decoration: none; border: 3px solid var(--madrid-dark);
      transition: all .2s ease;
    }
    header .brand-badge:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--madrid-dark); }

    /* Card - Torn Paper / Stamp Base */
    .card {
      background: var(--madrid-white);
      border: 4px solid var(--madrid-dark);
      padding: 30px;
      box-shadow: 12px 12px 0px rgba(10,27,46,0.15);
      position: relative;
      background-image: radial-gradient(var(--grunge-gray) 1px, transparent 0);
      background-size: 20px 20px;
    }

    /* Top Strip - Club Colors */
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 12px;
      background: repeating-linear-gradient(45deg, var(--primary-madrid), var(--primary-madrid) 20px, var(--secondary-madrid) 20px, var(--secondary-madrid) 40px);
    }

    /* Decorative Corner Stamps */
    .stamp-decor {
      position: absolute; width: 80px; height: 80px;
      border: 3px double var(--primary-madrid);
      border-radius: 50%; display: grid; place-items: center;
      font-family: 'Outfit'; font-weight: 800; font-size: 0.7rem;
      color: var(--primary-madrid); opacity: 0.4;
      text-align: center; pointer-events: none;
    }
    .st-1 { top: 40px; right: 20px; transform: rotate(15deg); }
    .st-2 { bottom: 80px; left: -30px; transform: rotate(-20deg); background: var(--madrid-white); z-index: 5; }

    /* Layout Form */
    .top-row { margin-bottom: 20px; }
    .select-btn {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px; border: 3px solid var(--madrid-dark);
      background: var(--madrid-white); cursor: pointer;
      font-weight: 700; font-family: 'Outfit', sans-serif;
    }
    
    .caret {
      background: var(--primary-madrid); color: #fff;
      padding: 4px 10px; font-size: 10px; border: 2px solid var(--madrid-dark);
    }

    /* Dropdown Panel */
    .panel {
      position: absolute; left: 30px; right: 30px; top: 95px;
      background: #fff; border: 3px solid var(--madrid-dark);
      box-shadow: 8px 8px 0 rgba(0,0,0,0.1);
      z-index: 100; display: none;
    }
    .panel.open { display: block; }
    .option {
      padding: 12px; cursor: pointer; font-weight: 600;
      border-bottom: 1px solid var(--grunge-gray);
    }
    .option:hover { background: var(--grunge-gray); color: var(--primary-madrid); }
    .option.selected { background: var(--primary-madrid); color: #fff; }

    /* Editor Textarea */
    textarea.editor {
      width: 100%; min-height: 380px; padding: 20px;
      border: 3px solid var(--madrid-dark);
      background: #fdfdfd; font-family: 'Poppins', sans-serif;
      font-size: 0.9rem; line-height: 1.6; color: #1a202c;
      resize: vertical; outline: none;
    }
    textarea.editor:focus { background: #fff; border-color: var(--secondary-madrid); }

    /* Bottom Actions */
    .bottom-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
    
    .hint { 
      font-size: 0.75rem; font-weight: 600; color: var(--madrid-dark);
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .btn-copy {
      background: var(--primary-madrid); color: #fff; border: 3px solid var(--madrid-dark);
      padding: 15px 30px; cursor: pointer; font-weight: 800;
      font-family: 'Outfit', sans-serif; text-transform: uppercase;
      box-shadow: 6px 6px 0 var(--madrid-dark); transition: all .1s;
    }
    .btn-copy:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0 var(--madrid-dark); background: #003C74; }
    .btn-copy:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--madrid-dark); }

    /* Overlay Lock - Madrid Style */
    #promoLockOverlay{
      position: fixed; inset: 0; display: none; z-index: 99999;
      background: rgba(10, 27, 46, 0.9); backdrop-filter: blur(5px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .lock-card{
      background: var(--madrid-white); border: 5px solid var(--madrid-dark);
      padding: 40px; text-align: center; max-width: 500px;
      box-shadow: 15px 15px 0 var(--secondary-madrid);
    }
    .lock-card h2 { font-family: 'Outfit'; color: var(--primary-madrid); font-size: 1.8rem; margin: 10px 0; }
    .lock-card .badge { 
      display: inline-block; padding: 10px 20px; background: var(--primary-madrid); 
      color: #fff; font-weight: 800; margin: 15px 0;
    }

    @media (max-width: 500px){
      header { transform: none; }
      .st-2 { display: none; }
      .bottom-bar { flex-direction: column; gap: 15px; }
      .btn-copy { width: 100%; }
    }
  </style>
</head>

    const STORAGE_KEY = 'diptarm_madrid_v3';
    const panel = document.getElementById('panel');
    const selectBtn = document.getElementById('selectBtn');
    const selectLabel = document.getElementById('selectLabel');
    const editor = document.getElementById('editor');
    const copyBtn = document.getElementById('copyBtn');

    let templates = DEFAULT_TEMPLATES;
    let currentId = Object.keys(templates)[0];

    function renderOptions(){
      panel.innerHTML = '';
      Object.keys(templates).forEach(id => {
        const opt = document.createElement('div');
        opt.className = 'option';
        opt.textContent = templates[id].title;
        opt.addEventListener('click', ()=> selectTemplate(id));
        panel.appendChild(opt);
      });
    }

    function selectTemplate(id){
      currentId = id;
      selectLabel.textContent = templates[id].title;
      editor.value = templates[id].body;
      panel.classList.remove('open');
    }

    selectBtn.addEventListener('click', () => panel.classList.toggle('open'));

    copyBtn.addEventListener('click', async ()=>{
      try {
        await navigator.clipboard.writeText(editor.value);
        copyBtn.textContent = "BERHASIL DISALIN!";
        setTimeout(()=> copyBtn.textContent = "SALIN FORMAT", 1500);
      } catch(e) { alert("Gagal menyalin"); }
    });

    // Simple Date Lock (Contoh aktif selamanya untuk demo, sesuaikan start/end UTC jika perlu)
    (function init(){
      renderOptions();
      selectTemplate(currentId);
      
      // Menyesuaikan istilah Cust sesuai instruksi User Ledger
      editor.value = editor.value.replace(/Kak/g, 'Cust');
    })();
  </script>
</body>
</html>
